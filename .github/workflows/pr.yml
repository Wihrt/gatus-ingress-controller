name: Pull Request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ── Go: lint, vet, build, unit tests ────────────────────────────────────────
  go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -v -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Docker: build image and upload as artifact ──────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: go
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: gatus-controller:ci-test
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ── E2E tests (Chainsaw) on k3s ──────────────────────────────────────────────
  e2e:
    name: E2E tests / Chainsaw (k3s)
    runs-on: ubuntu-latest
    needs: docker
    env:
      IMAGE_REGISTRY: gatus-controller
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="v1.35.1+k3s1" INSTALL_K3S_EXEC="--disable=traefik" sh -
          mkdir -p ~/.kube
          sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
          sudo chown "$(whoami)" ~/.kube/config
          kubectl wait --for=condition=ready nodes --all --timeout=60s

      - name: Import image into k3s
        run: |
          docker save gatus-controller:ci-test | sudo k3s ctr images import -

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install chainsaw
        run: |
          CHAINSAW_VERSION="v0.2.14"
          curl -fsSL "https://github.com/kyverno/chainsaw/releases/download/${CHAINSAW_VERSION}/chainsaw_linux_amd64.tar.gz" | tar -xz chainsaw
          sudo mv chainsaw /usr/local/bin/chainsaw
          chainsaw version

      - name: Run Chainsaw e2e tests
        run: |
          bash tests/e2e/setup.sh ci-test
          chainsaw test tests/e2e/chainsaw/tests/ --config tests/e2e/chainsaw/chainsaw-config.yaml
