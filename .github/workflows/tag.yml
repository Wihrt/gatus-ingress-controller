name: Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_NAME: gatus-ingress-controller

jobs:
  # ── Docker: retag SHA image with the version tag ─────────────────────────────
  docker:
    name: Retag Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Set image name (lowercased)
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Retag and push Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}

  # ── Helm: bump chart version/appVersion and publish ─────────────────────────
  helm:
    name: Bump and publish Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Get version from tag
        id: version
        run: echo "version=$(echo '${{ inputs.tag }}' | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Bump Chart.yaml version and appVersion
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/^version: .*/version: ${VERSION}/" charts/${{ env.CHART_NAME }}/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" charts/${{ env.CHART_NAME }}/Chart.yaml

      - name: Log in to Container registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Package and push Helm chart
        run: |
          helm package charts/${{ env.CHART_NAME }}
          helm push ${{ env.CHART_NAME }}-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
