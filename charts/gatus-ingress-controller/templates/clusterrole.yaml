apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "gatus-ingress-controller.fullname" . }}
  labels:
    {{- include "gatus-ingress-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monitoring.gatus.io"]
    resources: ["gatusalerts", "gatusendpoints", "gatusexternalendpoints", "gatusannouncements", "gatusmaintenances"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monitoring.gatus.io"]
    resources: ["gatusalerts/status", "gatusendpoints/status", "gatusexternalendpoints/status", "gatusannouncements/status", "gatusmaintenances/status"]
    verbs: ["get", "update", "patch"]
