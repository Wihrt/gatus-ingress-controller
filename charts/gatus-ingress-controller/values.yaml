crds:
  # Additional annotations to add to each CRD (e.g. for ArgoCD sync options).
  # Requires Helm v4, which supports templating in the crds/ directory.
  # Example:
  #   annotations:
  #     argocd.argoproj.io/sync-options: Replace=true
  annotations: {}

replicaCount: 1

image:
  repository: ghcr.io/wihrt/gatus-ingress-controller
  pullPolicy: IfNotPresent
  tag: "latest"

serviceAccount:
  create: true
  name: ""

# Namespace where the Gatus ConfigMap will be written
targetNamespace: gatus

# Name of the ConfigMap that the controller will append endpoints to.
# This ConfigMap must already exist and contain a config.yaml key with the
# main Gatus configuration (storage, alerting providers, web, etc.).
# Set this to match the ConfigMap name used by your Gatus Helm release.
configMapName: gatus-config

# Name of the Secret where sensitive outputs (alerting.yaml, endpoints.yaml,
# external-endpoints.yaml) will be written. Must already exist in targetNamespace.
secretName: gatus-secrets

# Webhook configuration for validating admission of GatusAlertingConfig resources.
# Requires cert-manager to be installed in the cluster when enabled.
webhook:
  enabled: true

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
