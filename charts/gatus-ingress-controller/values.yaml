crds:
  # Additional annotations to add to each CRD (e.g. for ArgoCD sync options).
  # Requires Helm v4, which supports templating in the crds/ directory.
  # Example:
  #   annotations:
  #     argocd.argoproj.io/sync-options: Replace=true
  annotations: {}

replicaCount: 1

image:
  repository: ghcr.io/wihrt/gatus-ingress-controller
  pullPolicy: IfNotPresent
  tag: "latest"

serviceAccount:
  create: true
  name: ""

# Namespace where the Gatus Secret will be written
targetNamespace: gatus

# Name of the Secret where endpoint configurations (endpoints.yaml,
# external-endpoints.yaml) will be written. Must already exist in targetNamespace.
secretName: gatus-secrets

# Webhook configuration for validating admission of GatusEndpoint resources.
# Requires cert-manager to be installed in the cluster when enabled.
webhook:
  enabled: true

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
