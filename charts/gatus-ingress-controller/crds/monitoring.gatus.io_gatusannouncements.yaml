apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatusannouncements.monitoring.gatus.io
spec:
  group: monitoring.gatus.io
  names:
    kind: GatusAnnouncement
    listKind: GatusAnnouncementList
    plural: gatusannouncements
    singular: gatusannouncement
    shortNames:
      - gan
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - timestamp
                - message
              properties:
                timestamp:
                  type: string
                  description: "UTC time of the announcement in RFC3339 format (e.g. 2025-11-07T14:00:00Z)."
                type:
                  type: string
                  description: "Severity/category of the announcement."
                  default: none
                  enum:
                    - outage
                    - warning
                    - information
                    - operational
                    - none
                message:
                  type: string
                  description: "Announcement text. Markdown is supported."
                archived:
                  type: boolean
                  description: "When true, moves the announcement to the Past Announcements section."
                  default: false
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
