apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatusendpoints.monitoring.gatus.io
spec:
  group: monitoring.gatus.io
  names:
    kind: GatusEndpoint
    listKind: GatusEndpointList
    plural: gatusendpoints
    singular: gatusendpoint
    shortNames:
      - ge
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - name
                - url
              properties:
                name:
                  type: string
                  description: Display name of the endpoint in Gatus.
                enabled:
                  type: boolean
                  default: true
                  description: Whether Gatus should monitor this endpoint.
                group:
                  type: string
                  description: Group name used to organize endpoints on the dashboard.
                url:
                  type: string
                  description: URL to monitor.
                method:
                  type: string
                  default: GET
                  description: HTTP request method.
                interval:
                  type: string
                  description: Duration between health checks (e.g. "60s", "5m").
                body:
                  type: string
                  description: HTTP request body.
                headers:
                  type: object
                  additionalProperties:
                    type: string
                  description: HTTP request headers.
                graphql:
                  type: boolean
                  description: Whether to wrap the body in a GraphQL query param.
                conditions:
                  type: array
                  items:
                    type: string
                  description: Health conditions to evaluate.
                alerts:
                  type: array
                  description: Inline alert configurations for this endpoint.
                  items:
                    type: object
                    required:
                      - type
                    properties:
                      type:
                        type: string
                        description: Alert provider type.
                        enum:
                          - awsses
                          - clickup
                          - custom
                          - datadog
                          - discord
                          - email
                          - gitea
                          - github
                          - gitlab
                          - googlechat
                          - gotify
                          - homeassistant
                          - ifttt
                          - ilert
                          - incident-io
                          - line
                          - matrix
                          - mattermost
                          - messagebird
                          - n8n
                          - newrelic
                          - ntfy
                          - opsgenie
                          - pagerduty
                          - plivo
                          - pushover
                          - rocketchat
                          - sendgrid
                          - signal
                          - signl4
                          - slack
                          - splunk
                          - squadcast
                          - teams
                          - teams-workflows
                          - telegram
                          - twilio
                          - vonage
                          - webex
                          - zapier
                          - zulip
                      enabled:
                        type: boolean
                        default: true
                      failureThreshold:
                        type: integer
                        default: 3
                      successThreshold:
                        type: integer
                        default: 2
                      sendOnResolved:
                        type: boolean
                      description:
                        type: string
                      minimumReminderInterval:
                        type: string
                      providerOverride:
                        type: object
                        description: Provider-specific configuration overrides.
                        x-kubernetes-preserve-unknown-fields: true
                dns:
                  type: object
                  description: DNS-specific monitoring configuration.
                  required:
                    - queryName
                  properties:
                    queryName:
                      type: string
                    queryType:
                      type: string
                      default: A
                ssh:
                  type: object
                  description: SSH-specific monitoring configuration.
                  required:
                    - username
                    - password
                  properties:
                    username:
                      type: string
                    password:
                      type: string
                client:
                  type: object
                  description: HTTP client configuration.
                  properties:
                    insecure:
                      type: boolean
                    ignoreRedirect:
                      type: boolean
                    timeout:
                      type: string
                    dnsResolver:
                      type: string
                    proxyUrl:
                      type: string
                    network:
                      type: string
                    oauth2:
                      type: object
                      required:
                        - tokenUrl
                        - clientId
                        - clientSecret
                        - scopes
                      properties:
                        tokenUrl:
                          type: string
                        clientId:
                          type: string
                        clientSecret:
                          type: string
                        scopes:
                          type: array
                          items:
                            type: string
                    tls:
                      type: object
                      properties:
                        certificateFile:
                          type: string
                        privateKeyFile:
                          type: string
                        renegotiation:
                          type: string
                          enum: [never, freely, once]
                ui:
                  type: object
                  description: UI display configuration.
                  properties:
                    hideConditions:
                      type: boolean
                    hideHostname:
                      type: boolean
                    hidePort:
                      type: boolean
                    hideUrl:
                      type: boolean
                    hideErrors:
                      type: boolean
                    dontResolveFailedConditions:
                      type: boolean
                    resolveSuccessfulConditions:
                      type: boolean
                maintenanceWindows:
                  type: array
                  description: Recurring maintenance windows during which alerts are suppressed.
                  items:
                    type: object
                    required:
                      - start
                      - duration
                    properties:
                      day:
                        type: string
                      every:
                        type: array
                        items:
                          type: string
                      start:
                        type: string
                      duration:
                        type: string
                      timezone:
                        type: string
                extraLabels:
                  type: object
                  additionalProperties:
                    type: string
                  description: Additional labels added to metrics.
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
