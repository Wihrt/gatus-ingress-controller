apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatusmaintenances.monitoring.gatus.io
spec:
  group: monitoring.gatus.io
  names:
    kind: GatusMaintenance
    listKind: GatusMaintenanceList
    plural: gatusmaintenances
    singular: gatusmaintenance
    shortNames:
      - gm
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - start
                - duration
              properties:
                enabled:
                  type: boolean
                  description: "Whether the maintenance window is active."
                  default: true
                start:
                  type: string
                  description: "Start time in HH:MM (24-hour) format."
                  pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
                duration:
                  type: string
                  description: "Length of the maintenance window (e.g. 1h, 30m)."
                timezone:
                  type: string
                  description: "IANA timezone name (e.g. Europe/Amsterdam). Defaults to UTC."
                every:
                  type: array
                  description: "Days on which this window applies. Leave empty for every day."
                  items:
                    type: string
                    enum:
                      - Monday
                      - Tuesday
                      - Wednesday
                      - Thursday
                      - Friday
                      - Saturday
                      - Sunday
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
