apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatusalerts.monitoring.gatus.io
spec:
  group: monitoring.gatus.io
  names:
    kind: GatusAlert
    listKind: GatusAlertList
    plural: gatusalerts
    singular: gatusalert
    shortNames:
      - ga
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - alertingConfigRef
              properties:
                alertingConfigRef:
                  type: string
                  description: Name of the GatusAlertingConfig in the same namespace. The provider type is resolved from the referenced object.
                enabled:
                  type: boolean
                  default: true
                  description: Whether this alert is globally enabled.
                failureThreshold:
                  type: integer
                  default: 3
                  description: Default consecutive failures before triggering the alert.
                successThreshold:
                  type: integer
                  default: 2
                  description: Default consecutive successes before resolving an incident.
                sendOnResolved:
                  type: boolean
                  description: Whether to send a notification when the alert resolves.
                description:
                  type: string
                  description: Default description included in the alert notification.
                minimumReminderInterval:
                  type: string
                  description: Minimum duration between alert reminders (e.g. "30m"). Empty disables reminders.
                providerOverride:
                  type: object
                  description: Provider-level configuration overrides for this alert. Keys are provider-specific.
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
