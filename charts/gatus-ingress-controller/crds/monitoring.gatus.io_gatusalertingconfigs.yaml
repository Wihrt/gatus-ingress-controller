apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatusalertingconfigs.monitoring.gatus.io
spec:
  group: monitoring.gatus.io
  names:
    kind: GatusAlertingConfig
    listKind: GatusAlertingConfigList
    plural: gatusalertingconfigs
    singular: gatusalertingconfig
    shortNames:
      - gac
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  description: Alert provider type. Exactly one per GatusAlertingConfig object.
                  enum:
                    - awsses
                    - clickup
                    - custom
                    - datadog
                    - discord
                    - email
                    - gitea
                    - github
                    - gitlab
                    - googlechat
                    - gotify
                    - homeassistant
                    - ifttt
                    - ilert
                    - incident-io
                    - line
                    - matrix
                    - mattermost
                    - messagebird
                    - n8n
                    - newrelic
                    - ntfy
                    - opsgenie
                    - pagerduty
                    - plivo
                    - pushover
                    - rocketchat
                    - sendgrid
                    - signal
                    - signl4
                    - slack
                    - splunk
                    - squadcast
                    - teams
                    - teams-workflows
                    - telegram
                    - twilio
                    - vonage
                    - webex
                    - zapier
                    - zulip
                config:
                  type: object
                  description: Non-sensitive provider-specific configuration key-value pairs (see Gatus docs for each provider).
                  x-kubernetes-preserve-unknown-fields: true
                configSecretRef:
                  type: object
                  description: >
                    Reference to a Secret whose data keys are merged into the provider
                    configuration on top of spec.config. Use for sensitive fields such as
                    API keys, webhook URLs, and passwords. Typically managed by External
                    Secrets Operator. Secret values override any matching key in spec.config.
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Name of the Secret in the controller's namespace.
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
