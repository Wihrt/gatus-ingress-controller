apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatusexternalendpoints.monitoring.gatus.io
spec:
  group: monitoring.gatus.io
  names:
    kind: GatusExternalEndpoint
    listKind: GatusExternalEndpointList
    plural: gatusexternalendpoints
    singular: gatusexternalendpoint
    shortNames:
      - gee
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - name
                - token
              properties:
                name:
                  type: string
                  description: Display name of the external endpoint in Gatus.
                enabled:
                  type: boolean
                  default: true
                  description: Whether this external endpoint is active.
                group:
                  type: string
                  description: Group name used to organize endpoints on the dashboard.
                token:
                  type: string
                  description: Bearer token required to push status updates to this endpoint.
                alerts:
                  type: array
                  description: Inline alert configurations for this external endpoint.
                  items:
                    type: object
                    required:
                      - type
                    properties:
                      type:
                        type: string
                        description: Alert provider type.
                        enum:
                          - awsses
                          - clickup
                          - custom
                          - datadog
                          - discord
                          - email
                          - gitea
                          - github
                          - gitlab
                          - googlechat
                          - gotify
                          - homeassistant
                          - ifttt
                          - ilert
                          - incident-io
                          - line
                          - matrix
                          - mattermost
                          - messagebird
                          - n8n
                          - newrelic
                          - ntfy
                          - opsgenie
                          - pagerduty
                          - plivo
                          - pushover
                          - rocketchat
                          - sendgrid
                          - signal
                          - signl4
                          - slack
                          - splunk
                          - squadcast
                          - teams
                          - teams-workflows
                          - telegram
                          - twilio
                          - vonage
                          - webex
                          - zapier
                          - zulip
                      enabled:
                        type: boolean
                        default: true
                      failureThreshold:
                        type: integer
                        default: 3
                      successThreshold:
                        type: integer
                        default: 2
                      sendOnResolved:
                        type: boolean
                      description:
                        type: string
                      minimumReminderInterval:
                        type: string
                      providerOverride:
                        type: object
                        description: Provider-specific configuration overrides.
                        x-kubernetes-preserve-unknown-fields: true
                heartbeat:
                  type: object
                  description: Automatic failure detection when updates stop being received.
                  properties:
                    interval:
                      type: string
                      description: Expected duration between updates (e.g. "30m"). Must be at least 10s.
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string
