apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "gatus-controller.fullname" . }}
  namespace: {{ .Values.targetNamespace }}
  labels:
    {{- include "gatus-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "gatus-controller.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "gatus-controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
