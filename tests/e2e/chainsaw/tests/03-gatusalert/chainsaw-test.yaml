apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gatusalert
spec:
  concurrent: false
  catch:
    - podLogs:
        namespace: gatus-system
        selector: app.kubernetes.io/name=gatus-ingress-controller
        tail: 100
  steps:
    # ── Step 1: Configured=True when matching GatusAlertingConfig exists ──────
    - name: "[GatusAlert] Configured=True when matching GatusAlertingConfig exists"
      try:
        # Ensure the prerequisite GatusAlertingConfig exists in this test namespace
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlertingConfig
              metadata:
                name: slack-config
              spec:
                type: slack
                config:
                  webhook-url: "https://hooks.slack.com/services/test/test/test"
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlert
              metadata:
                name: test-slack-alert
              spec:
                alertingConfigRef: slack-config
                failureThreshold: 5
                successThreshold: 2
                sendOnResolved: true
                description: "E2E test alert"
        - assert:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlert
              metadata:
                name: test-slack-alert
              status:
                conditions:
                  - type: Configured
                    status: "True"
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAlert
            name: test-slack-alert
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAlertingConfig
            name: slack-config

    # ── Step 2: Webhook rejects GatusAlert with non-existent alertingConfigRef ─
    - name: "[GatusAlert] Webhook rejects GatusAlert with non-existent alertingConfigRef"
      try:
        - error:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlert
              metadata:
                name: nonexistent-ref-alert
              spec:
                alertingConfigRef: nonexistent-config
                failureThreshold: 3
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAlert
            name: nonexistent-ref-alert

    # ── Step 3: Update GatusAlert — failureThreshold change reflected ────────
    - name: "[GatusAlert] update failureThreshold reflects in status"
      try:
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlert
              metadata:
                name: test-slack-alert
              spec:
                alertingConfigRef: slack-config
                failureThreshold: 10
                successThreshold: 5
                sendOnResolved: false
                description: "Updated E2E test alert"
        - assert:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlert
              metadata:
                name: test-slack-alert
              status:
                conditions:
                  - type: Configured
                    status: "True"
              spec:
                failureThreshold: 10
                successThreshold: 5
                description: "Updated E2E test alert"
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAlert
            name: test-slack-alert

    # ── Step 4: Delete the GatusAlertingConfig — alert becomes unconfigured ───
    - name: "[GatusAlert] Configured=False after referenced GatusAlertingConfig deleted"
      try:
        - delete:
            ref:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlertingConfig
              name: slack-config
        - assert:
            timeout: 30s
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlert
              metadata:
                name: test-slack-alert
              status:
                conditions:
                  - type: Configured
                    status: "False"
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAlert
            name: test-slack-alert
