apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gatusannouncement
spec:
  concurrent: false
  catch:
    - podLogs:
        namespace: gatus-system
        selector: app.kubernetes.io/name=gatus-ingress-controller
        tail: 100
  steps:
    # ── Step 1: Announcement aggregated into ConfigMap ────────────────────────
    - name: "[GatusAnnouncement] aggregated into announcements.yaml ConfigMap"
      try:
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAnnouncement
              metadata:
                name: test-announcement
              spec:
                timestamp: "2025-11-07T22:00:00Z"
                type: warning
                message: "E2E test scheduled maintenance tonight."
                archived: false
        - assert:
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: gatus-config
                namespace: gatus
              "(contains(lookup(data, 'announcements.yaml'), 'E2E test'))": true
              "(contains(lookup(data, 'announcements.yaml'), '2025-11-07T22:00:00Z'))": true
              "(contains(lookup(data, 'announcements.yaml'), 'warning'))": true
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAnnouncement
            name: test-announcement
        - script:
            content: kubectl get configmap gatus-config -n gatus -o jsonpath='{.data.announcements\.yaml}'

    # ── Step 2: Ordering is newest-first ─────────────────────────────────────
    - name: "[GatusAnnouncement] ordering is newest-first"
      try:
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAnnouncement
              metadata:
                name: test-announcement-newer
              spec:
                timestamp: "2025-12-01T10:00:00Z"
                type: information
                message: "Newer announcement."
        - assert:
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: gatus-config
                namespace: gatus
              # Split by the newer timestamp; the older timestamp must appear in the second part,
              # proving that 2025-12-01 (newer) comes before 2025-11-07 (older) in the output.
              "(contains(split(lookup(data, 'announcements.yaml'), '2025-12-01')[1], '2025-11-07'))": true
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAnnouncement
            name: test-announcement-newer
        - script:
            content: kubectl get configmap gatus-config -n gatus -o jsonpath='{.data.announcements\.yaml}'

    # ── Step 3: Update announcement message is reflected ─────────────────────
    - name: "[GatusAnnouncement] update message reflected in announcements.yaml"
      try:
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAnnouncement
              metadata:
                name: test-announcement
              spec:
                timestamp: "2025-11-07T22:00:00Z"
                type: outage
                message: "Updated maintenance message for E2E."
                archived: true
        - assert:
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: gatus-config
                namespace: gatus
              "(contains(lookup(data, 'announcements.yaml'), 'Updated maintenance message'))": true
              "(contains(lookup(data, 'announcements.yaml'), 'outage'))": true
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAnnouncement
            name: test-announcement
        - script:
            content: kubectl get configmap gatus-config -n gatus -o jsonpath='{.data.announcements\.yaml}'

    # ── Step 4: Delete announcement is removed from ConfigMap ────────────────
    - name: "[GatusAnnouncement] deleted announcement removed from announcements.yaml"
      try:
        - delete:
            ref:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAnnouncement
              name: test-announcement
        - script:
            timeout: 30s
            content: |
              for i in $(seq 1 15); do
                DATA=$(kubectl get configmap gatus-config -n gatus -o jsonpath='{.data.announcements\.yaml}')
                if echo "$DATA" | grep -q "Updated maintenance message"; then
                  sleep 2
                else
                  exit 0
                fi
              done
              echo "FAIL: test-announcement still present in announcements.yaml"
              exit 1
      catch:
        - script:
            content: kubectl get configmap gatus-config -n gatus -o jsonpath='{.data.announcements\.yaml}'

    # ── Step 5: Delete last announcement — list becomes empty ────────────────
    - name: "[GatusAnnouncement] deleting all announcements produces empty list"
      try:
        - delete:
            ref:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAnnouncement
              name: test-announcement-newer
        - script:
            timeout: 30s
            content: |
              for i in $(seq 1 15); do
                DATA=$(kubectl get configmap gatus-config -n gatus -o jsonpath='{.data.announcements\.yaml}')
                if echo "$DATA" | grep -q "Newer announcement"; then
                  sleep 2
                else
                  exit 0
                fi
              done
              echo "FAIL: announcements still present"
              exit 1
      catch:
        - script:
            content: kubectl get configmap gatus-config -n gatus -o jsonpath='{.data.announcements\.yaml}'
