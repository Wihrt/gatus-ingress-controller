apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gatusendpoint-alert
spec:
  concurrent: false
  steps:
    # ── Step 1: Alert reference renders type and failure-threshold ────────────
    - name: "[GatusEndpoint+Alert] alert reference renders in endpoints.yaml"
      try:
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlertingConfig
              metadata:
                name: slack-config
              spec:
                type: slack
                config:
                  webhook-url: "https://hooks.slack.com/services/test/test/test"
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlert
              metadata:
                name: test-slack-alert
              spec:
                alertingConfigRef: slack-config
                failureThreshold: 5
                successThreshold: 2
                sendOnResolved: true
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusEndpoint
              metadata:
                name: test-alerted-endpoint
              spec:
                name: "alerted-endpoint"
                group: "e2e"
                url: "https://alerted.example.com"
                conditions:
                  - "[STATUS] == 200"
                alerts:
                  - name: test-slack-alert
                    failureThreshold: 5
                    successThreshold: 2
        - assert:
            resource:
              apiVersion: v1
              kind: Secret
              metadata:
                name: gatus-secrets
                namespace: gatus
              "(contains(base64_decode(lookup(data, 'endpoints.yaml')), 'alerted-endpoint'))": true
              "(contains(base64_decode(lookup(data, 'endpoints.yaml')), 'type: slack'))": true
              "(contains(base64_decode(lookup(data, 'endpoints.yaml')), 'failure-threshold: 5'))": true
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusEndpoint
            name: test-alerted-endpoint
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAlert
            name: test-slack-alert
        - script:
            content: kubectl get secret gatus-secrets -n gatus -o jsonpath='{.data.endpoints\.yaml}' | base64 -d

    # ── Step 2: providerOverride propagated to endpoints.yaml ─────────────────
    - name: "[GatusAlert] providerOverride propagated to endpoints.yaml"
      try:
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlert
              metadata:
                name: test-slack-override
              spec:
                alertingConfigRef: slack-config
                failureThreshold: 3
                providerOverride:
                  title: "E2E Override Alert"
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusEndpoint
              metadata:
                name: test-override-endpoint
              spec:
                name: "override-endpoint"
                group: "e2e"
                url: "https://override.example.com"
                alerts:
                  - name: test-slack-override
        - assert:
            resource:
              apiVersion: v1
              kind: Secret
              metadata:
                name: gatus-secrets
                namespace: gatus
              "(contains(base64_decode(lookup(data, 'endpoints.yaml')), 'override-endpoint'))": true
              "(contains(base64_decode(lookup(data, 'endpoints.yaml')), 'provider-override'))": true
              "(contains(base64_decode(lookup(data, 'endpoints.yaml')), 'E2E Override Alert'))": true
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAlert
            name: test-slack-override
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusEndpoint
            name: test-override-endpoint
        - script:
            content: kubectl get secret gatus-secrets -n gatus -o jsonpath='{.data.endpoints\.yaml}' | base64 -d
