apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gatusalertingconfig
spec:
  concurrent: false
  catch:
    - podLogs:
        namespace: gatus-system
        selector: app.kubernetes.io/name=gatus-ingress-controller
        tail: 100
  steps:
    # ── Step 1: Valid Slack config aggregated into alerting.yaml Secret ───────
    - name: "[GatusAlertingConfig] valid Slack config aggregated into alerting.yaml"
      try:
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlertingConfig
              metadata:
                name: slack-config
              spec:
                type: slack
                config:
                  webhook-url: "https://hooks.slack.com/services/test/test/test"
        - assert:
            resource:
              apiVersion: v1
              kind: Secret
              metadata:
                name: gatus-secrets
                namespace: gatus
              "(contains(base64_decode(lookup(data, 'alerting.yaml')), 'hooks.slack.com'))": true
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAlertingConfig
            name: slack-config
        - script:
            content: kubectl get secret gatus-secrets -n gatus -o jsonpath='{.data.alerting\.yaml}' | base64 -d

    # ── Step 2: Valid=True status condition set ───────────────────────────────
    - name: "[GatusAlertingConfig] Valid=True condition set for valid config"
      try:
        - assert:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlertingConfig
              metadata:
                name: slack-config
              status:
                conditions:
                  - type: Valid
                    status: "True"
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAlertingConfig
            name: slack-config

    # ── Step 3: Valid=False for invalid config (missing required field) ───────
    - name: "[GatusAlertingConfig] Valid=False condition set for invalid config"
      try:
        - error:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlertingConfig
              metadata:
                name: invalid-discord
              spec:
                type: discord
                config:
                  some-other-key: "no-webhook"

    # ── Step 4: Webhook rejects second config of same type (uniqueness) ────────
    - name: "[GatusAlertingConfig] Webhook rejects second Slack config (cluster-wide uniqueness)"
      try:
        - error:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlertingConfig
              metadata:
                name: another-slack-config
              spec:
                type: slack
                config:
                  webhook-url: "https://hooks.slack.com/services/other/other/other"

    # ── Step 5: configSecretRef merged into alerting config ────────────────────
    # The configSecretRef Secret must live in the controller's namespace (gatus-system),
    # because the controller reads it from its own namespace (POD_NAMESPACE).
    - name: "[GatusAlertingConfig] configSecretRef merged into alerting.yaml"
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Secret
              metadata:
                name: discord-secret
                namespace: gatus-system
              stringData:
                webhook-url: "https://discord.com/api/webhooks/secret-value"
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlertingConfig
              metadata:
                name: discord-config
              spec:
                type: discord
                configSecretRef:
                  name: discord-secret
        - assert:
            resource:
              apiVersion: v1
              kind: Secret
              metadata:
                name: gatus-secrets
                namespace: gatus
              "(contains(base64_decode(lookup(data, 'alerting.yaml')), 'discord.com/api/webhooks/secret-value'))": true
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAlertingConfig
            name: discord-config
        - script:
            content: kubectl get secret gatus-secrets -n gatus -o jsonpath='{.data.alerting\.yaml}' | base64 -d

    # ── Step 6: Update webhook-url is reflected in alerting.yaml ──────────────
    - name: "[GatusAlertingConfig] update webhook-url is reflected in alerting.yaml"
      try:
        - apply:
            resource:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlertingConfig
              metadata:
                name: slack-config
              spec:
                type: slack
                config:
                  webhook-url: "https://hooks.slack.com/services/updated/updated/updated"
        - assert:
            resource:
              apiVersion: v1
              kind: Secret
              metadata:
                name: gatus-secrets
                namespace: gatus
              "(contains(base64_decode(lookup(data, 'alerting.yaml')), 'hooks.slack.com/services/updated'))": true
      catch:
        - describe:
            apiVersion: monitoring.gatus.io/v1alpha1
            kind: GatusAlertingConfig
            name: slack-config
        - script:
            content: kubectl get secret gatus-secrets -n gatus -o jsonpath='{.data.alerting\.yaml}' | base64 -d

    # ── Step 7: Delete Slack config removes it from alerting.yaml ─────────────
    - name: "[GatusAlertingConfig] deleted config removed from alerting.yaml"
      try:
        - delete:
            ref:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlertingConfig
              name: slack-config
        - script:
            timeout: 30s
            content: |
              for i in $(seq 1 15); do
                DATA=$(kubectl get secret gatus-secrets -n gatus -o jsonpath='{.data.alerting\.yaml}' | base64 -d)
                if echo "$DATA" | grep -q "hooks.slack.com"; then
                  sleep 2
                else
                  exit 0
                fi
              done
              echo "FAIL: slack config still present in alerting.yaml"
              exit 1
      catch:
        - script:
            content: kubectl get secret gatus-secrets -n gatus -o jsonpath='{.data.alerting\.yaml}' | base64 -d

    # ── Step 8: Delete discord config removes it from alerting.yaml ───────────
    - name: "[GatusAlertingConfig] deleted discord config removed from alerting.yaml"
      try:
        - delete:
            ref:
              apiVersion: monitoring.gatus.io/v1alpha1
              kind: GatusAlertingConfig
              name: discord-config
        - script:
            timeout: 30s
            content: |
              for i in $(seq 1 15); do
                DATA=$(kubectl get secret gatus-secrets -n gatus -o jsonpath='{.data.alerting\.yaml}' | base64 -d)
                if echo "$DATA" | grep -q "discord"; then
                  sleep 2
                else
                  exit 0
                fi
              done
              echo "FAIL: discord config still present in alerting.yaml"
              exit 1
      catch:
        - script:
            content: kubectl get secret gatus-secrets -n gatus -o jsonpath='{.data.alerting\.yaml}' | base64 -d

    # ── Step 9: Clean up discord-secret from controller namespace ─────────────
    - name: "[GatusAlertingConfig] cleanup discord-secret from controller namespace"
      try:
        - delete:
            ref:
              apiVersion: v1
              kind: Secret
              namespace: gatus-system
              name: discord-secret
