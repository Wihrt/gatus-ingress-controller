apiVersion: chainsaw.kyverno.io/v1alpha2
kind: Configuration
metadata:
  name: default
spec:
  execution:
    # Run tests sequentially: all tests share gatus-secrets and gatus-config
    # in the gatus namespace; parallel execution would cause race conditions.
    parallel: 1
  timeouts:
    apply: 10s
    assert: 60s
    delete: 30s
    error: 30s
    exec: 60s
  cleanup:
    skipDelete: false
