version: "3"

vars:
  IMAGE_REGISTRY: '{{.IMAGE_REGISTRY | default "ghcr.io"}}'
  IMAGE_REPO: '{{.IMAGE_REPO | default "wihrt/gatus-ingress-controller"}}'
  IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'

tasks:
  build:
    desc: Build the Go binary
    cmds:
      - go build ./...

  test:
    desc: Run all tests
    cmds:
      - go test ./... -v

  fmt:
    desc: Format Go source files
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  docker-build:
    internal: true
    cmds:
      - docker build -t {{.IMAGE_REGISTRY}}/{{.IMAGE_REPO}}:{{.IMAGE_TAG}} .

  docker-build:latest:
    desc: Build the container image
    cmds:
      - task: docker-build

  docker-build:ci:
    cmds:
      - task: docker-build
        vars:
          IMAGE_TAG: "ci-test"

  docker-push:
    desc: Push the container image
    cmds:
      - docker push {{.IMAGE_REGISTRY}}/{{.IMAGE_REPO}}:{{.IMAGE_TAG}}

  act:pr:
    desc: Validate PR workflow locally (go + docker jobs; e2e requires k3s and is skipped)
    cmds:
      - act pull_request -W .github/workflows/pr.yml --job go
      - act pull_request -W .github/workflows/pr.yml --job docker

  act:e2e:
    desc: "Validate PR e2e job locally — requires a running Kubernetes cluster (e.g. k3s)"
    cmds:
      - act pull_request -W .github/workflows/pr.yml --job e2e

  act:main:
    desc: Validate Main workflow locally (go job; docker job pushes to registry and is skipped)
    cmds:
      - act push -W .github/workflows/main.yml --job go
      - act push -W .github/workflows/main.yml --job docker

  act:tag:
    desc: "Simulate Tag workflow dispatch locally. Usage: task act:tag TAG=v1.2.3 — requires gh CLI to be authenticated. Note: docker job needs the SHA-tagged image to already exist in the registry."
    vars:
      TAG: '{{.TAG | default "v0.0.0-test"}}'
    cmds:
      - act workflow_dispatch -W .github/workflows/tag.yml --input tag={{.TAG}} -s GITHUB_TOKEN="$(gh auth token)"

  e2e:
    desc: "Run Chainsaw e2e tests against a running cluster. Usage: task e2e TAG=ci-test"
    vars:
      TAG: '{{.TAG | default "ci-test"}}'
    cmds:
      - bash tests/e2e/setup.sh {{.TAG}}
      - chainsaw test tests/e2e/chainsaw/tests/ --config tests/e2e/chainsaw/chainsaw-config.yaml
